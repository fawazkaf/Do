<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAPPY HELL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }

  #game-wrapper {
    position: relative;
    width: 400px;
    height: 600px;
  }

  canvas {
    display: block;
    border: 1px solid #ff003c;
    box-shadow: 0 0 30px #ff003c, 0 0 60px #ff003c44, inset 0 0 30px #00000088;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    z-index: 10;
    gap: 16px;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 52px;
    color: #ff003c;
    text-shadow: 0 0 20px #ff003c, 0 0 40px #ff003c, 0 0 80px #ff003c88;
    letter-spacing: 4px;
    animation: flicker 3s infinite;
    line-height: 1;
  }

  .overlay-sub {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: #ff003c88;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .score-display {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    color: #00ffcc;
    text-shadow: 0 0 15px #00ffcc;
    letter-spacing: 2px;
  }

  .best-display {
    font-size: 13px;
    color: #ffffff66;
    letter-spacing: 3px;
  }

  .start-btn {
    margin-top: 10px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid #ff003c;
    color: #ff003c;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #ff003c;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
    z-index: -1;
  }

  .start-btn:hover { color: #000; box-shadow: 0 0 20px #ff003c; }
  .start-btn:hover::before { transform: scaleX(1); }

  .hint {
    font-size: 11px;
    color: #ffffff33;
    letter-spacing: 2px;
  }

  .difficulty-badge {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: #ff003c;
    border: 1px solid #ff003c44;
    padding: 4px 12px;
    letter-spacing: 3px;
    background: #ff003c11;
  }

  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; }
    20%,24%,55% { opacity:0.4; }
  }

  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px;
    pointer-events: none;
    z-index: 5;
  }

  #score-hud {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 10px #fff, 0 0 20px #ffffff88;
    line-height: 1;
  }

  #best-hud {
    font-size: 11px;
    color: #ffffff55;
    letter-spacing: 2px;
    text-align: right;
  }

  #level-hud {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: #ff003c;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #ff003c;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="c" width="400" height="600"></canvas>

  <div id="hud">
    <div>
      <div id="score-hud">0</div>
      <div id="level-hud">LVL 1</div>
    </div>
    <div id="best-hud">BEST<br><span id="best-val">0</span></div>
  </div>

  <div id="overlay">
    <div class="overlay-title">FLAPPY<br>HELL</div>
    <div class="overlay-sub">GOOD LUCK</div>
    <div class="difficulty-badge">⚠ EXTREME DIFFICULTY</div>
    <div id="death-score" class="score-display" style="display:none"></div>
    <div id="death-best" class="best-display" style="display:none"></div>
    <button class="start-btn" id="startBtn">[ ENTER ]</button>
    <div class="hint">SPACE / CLICK / TAP TO FLAP</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;

// Game state
let state = 'idle'; // idle, playing, dead
let score = 0, best = 0, frame = 0;
let particles = [], bg_lines = [];

// Bird
const bird = {
  x: 90, y: H/2, vy: 0,
  w: 28, h: 22,
  rot: 0,
  trail: [],
  alive: true
};

// Pipes
let pipes = [];
let pipeTimer = 0;

// Difficulty config (gets harder as score increases)
function getDiff() {
  const s = score;
  return {
    gap: Math.max(90, 155 - s * 2.5),       // shrinks fast
    speed: Math.min(6.5, 2.2 + s * 0.18),   // speeds up fast
    pipeInterval: Math.max(52, 88 - s * 1.5),// more frequent
    gravity: 0.38 + s * 0.004,              // heavier
    flapPower: -(6.5 + s * 0.04),           // slightly more flap
    wobble: s > 15,                          // pipes wobble
    moving: s > 10,                          // pipes move vertically
    fake: s > 20,                            // fake gaps
  };
}

// Background lines (scanlines effect)
for (let i = 0; i < 12; i++) {
  bg_lines.push({ y: Math.random() * H, speed: 0.3 + Math.random() * 0.5, alpha: 0.03 + Math.random() * 0.04 });
}

function spawnPipe() {
  const d = getDiff();
  const minY = 60, maxY = H - 60 - d.gap;
  const gapY = minY + Math.random() * (maxY - minY);
  pipes.push({
    x: W + 30,
    gapY,
    gapH: d.gap,
    w: 52,
    passed: false,
    vy: d.moving ? (Math.random() - 0.5) * 1.2 : 0,
    wobblePhase: Math.random() * Math.PI * 2,
    isFake: d.fake && Math.random() < 0.12,
    color: Math.random() < 0.15 ? '#ff003c' : '#0ff',
  });
}

function flap() {
  if (state === 'idle' || state === 'dead') {
    startGame();
    return;
  }
  if (!bird.alive) return;
  const d = getDiff();
  bird.vy = d.flapPower;
  spawnParticles(bird.x, bird.y, '#00ffcc', 6);
}

function startGame() {
  score = 0;
  frame = 0;
  pipes = [];
  pipeTimer = 0;
  particles = [];
  bird.y = H / 2;
  bird.vy = 0;
  bird.rot = 0;
  bird.trail = [];
  bird.alive = true;
  state = 'playing';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('score-hud').textContent = '0';
  document.getElementById('level-hud').textContent = 'LVL 1';
}

function showDead() {
  state = 'dead';
  if (score > best) best = score;
  document.getElementById('best-val').textContent = best;
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.querySelector('.overlay-title').textContent = '';
  document.querySelector('.overlay-title').innerHTML = 'YOU<br>DIED';
  document.querySelector('.overlay-sub').textContent = 'AGAIN';
  const ds = document.getElementById('death-score');
  ds.style.display = 'block';
  ds.textContent = 'SCORE: ' + score;
  const db = document.getElementById('death-best');
  db.style.display = 'block';
  db.textContent = (score >= best ? '★ NEW BEST ★' : 'BEST: ' + best);
  document.getElementById('startBtn').textContent = '[ RETRY ]';
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

function drawBackground() {
  // Deep space grid
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#000008');
  grad.addColorStop(1, '#0a0010');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#ff003c0a';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Moving scan lines
  for (let l of bg_lines) {
    l.y = (l.y + l.speed) % H;
    ctx.fillStyle = `rgba(0,255,200,${l.alpha})`;
    ctx.fillRect(0, l.y, W, 1);
  }
}

function drawPipe(pipe) {
  const topH = pipe.gapY;
  const botY = pipe.gapY + pipe.gapH;
  const botH = H - botY;
  const col = pipe.isFake ? '#ff003c' : '#0ff';
  const glow = pipe.isFake ? '#ff003c' : '#00ffcc';

  ctx.save();

  // Glow
  ctx.shadowColor = glow;
  ctx.shadowBlur = 12;

  // Top pipe
  const tg = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipe.w, 0);
  tg.addColorStop(0, col + '33');
  tg.addColorStop(0.3, col + 'bb');
  tg.addColorStop(0.7, col + 'bb');
  tg.addColorStop(1, col + '33');
  ctx.fillStyle = tg;
  ctx.fillRect(pipe.x, 0, pipe.w, topH);

  // Top pipe cap
  ctx.fillStyle = col;
  ctx.fillRect(pipe.x - 5, topH - 16, pipe.w + 10, 16);

  // Bot pipe
  ctx.fillStyle = tg;
  ctx.fillRect(pipe.x, botY, pipe.w, botH);

  // Bot pipe cap
  ctx.fillStyle = col;
  ctx.fillRect(pipe.x - 5, botY, pipe.w + 10, 16);

  // Edge lines
  ctx.strokeStyle = col;
  ctx.lineWidth = 1;
  ctx.shadowBlur = 0;
  ctx.strokeRect(pipe.x, 0, pipe.w, topH);
  ctx.strokeRect(pipe.x, botY, pipe.w, botH);

  // WARNING stripes on fake pipes
  if (pipe.isFake) {
    ctx.fillStyle = '#ff003c44';
    for (let sy = 0; sy < topH; sy += 20) {
      ctx.fillRect(pipe.x, sy, pipe.w, 10);
    }
    ctx.font = 'bold 10px Share Tech Mono';
    ctx.fillStyle = '#ff003c';
    ctx.textAlign = 'center';
    ctx.fillText('FAKE', pipe.x + pipe.w/2, pipe.gapY/2);
  }

  ctx.restore();
}

function drawBird() {
  const { x, y, rot, trail } = bird;

  // Trail
  for (let i = 0; i < trail.length; i++) {
    const t = trail[i];
    const alpha = (i / trail.length) * 0.4;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(t.x, t.y, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Body glow
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 20;

  // Body
  const bg = ctx.createRadialGradient(0, 0, 2, 0, 0, 16);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(0.4, '#00ffcc');
  bg.addColorStop(1, '#004433');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.fillStyle = '#00ffcc88';
  ctx.beginPath();
  ctx.ellipse(-2, 4, 10, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(6, -2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff003c';
  ctx.beginPath();
  ctx.arc(7, -2, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.moveTo(13, 0); ctx.lineTo(20, -2); ctx.lineTo(20, 2); ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (let p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawGround() {
  ctx.fillStyle = '#ff003c22';
  ctx.fillRect(0, H - 1, W, 1);
  ctx.strokeStyle = '#ff003c';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#ff003c';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(0, H - 1);
  ctx.lineTo(W, H - 1);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawFlashEffect() {
  if (!bird.alive && frame < 8) {
    ctx.fillStyle = `rgba(255,0,60,${0.5 - frame * 0.06})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function update() {
  if (state !== 'playing') return;
  frame++;

  const d = getDiff();

  // Bird physics
  bird.vy += d.gravity;
  bird.y += bird.vy;
  bird.rot = Math.max(-0.5, Math.min(Math.PI / 2.5, bird.vy * 0.065));

  // Trail
  bird.trail.push({ x: bird.x, y: bird.y });
  if (bird.trail.length > 12) bird.trail.shift();

  // Ground/ceiling death
  if (bird.y + bird.h/2 >= H || bird.y - bird.h/2 <= 0) {
    killBird();
    return;
  }

  // Spawn pipes
  pipeTimer++;
  if (pipeTimer >= d.pipeInterval) {
    spawnPipe();
    pipeTimer = 0;
  }

  // Update pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= d.speed;

    // Vertical movement
    if (d.moving) {
      p.gapY += p.vy;
      const minY = 40, maxY = H - 40 - p.gapH;
      if (p.gapY < minY || p.gapY > maxY) p.vy *= -1;
    }

    // Wobble
    if (d.wobble) {
      p.wobblePhase += 0.05;
      p.x += Math.sin(p.wobblePhase) * 0.6;
    }

    // Score
    if (!p.passed && p.x + p.w < bird.x) {
      if (!p.isFake) {
        score++;
        document.getElementById('score-hud').textContent = score;
        const lvl = Math.floor(score / 5) + 1;
        document.getElementById('level-hud').textContent = 'LVL ' + lvl;
        spawnParticles(bird.x, bird.y, '#ffd700', 8);
      }
      p.passed = true;
    }

    // Collision (fake pipes = no collision)
    if (!p.isFake) {
      const bx = bird.x - bird.w/2 + 4, by = bird.y - bird.h/2 + 3;
      const bw = bird.w - 8, bh = bird.h - 6;

      // Top pipe
      if (rectCollide(bx, by, bw, bh, p.x - 5, 0, p.w + 10, p.gapY)) {
        killBird(); return;
      }
      // Bottom pipe
      if (rectCollide(bx, by, bw, bh, p.x - 5, p.gapY + p.gapH, p.w + 10, H)) {
        killBird(); return;
      }
    }

    // Remove offscreen
    if (p.x + p.w < -60) pipes.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function killBird() {
  if (!bird.alive) return;
  bird.alive = false;
  spawnParticles(bird.x, bird.y, '#ff003c', 30);
  spawnParticles(bird.x, bird.y, '#ffffff', 15);
  setTimeout(showDead, 900);
}

// Idle animation
let idleBobY = 0, idleBobFrame = 0;

function drawIdle() {
  idleBobFrame++;
  idleBobY = Math.sin(idleBobFrame * 0.05) * 8;
  bird.y = H / 2 + idleBobY;
  bird.rot = Math.sin(idleBobFrame * 0.05) * 0.15;
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'idle') {
    drawIdle();
    drawBird();
  } else if (state === 'playing') {
    update();
    for (let p of pipes) drawPipe(p);
    drawParticles();
    drawBird();
  } else if (state === 'dead') {
    for (let p of pipes) drawPipe(p);
    drawParticles();
    // update particles after death
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.05;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  drawGround();
  drawFlashEffect();
  requestAnimationFrame(loop);
}

// Controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); flap(); }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); flap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });
document.getElementById('startBtn').addEventListener('click', e => {
  e.preventDefault();
  flap();
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target !== document.getElementById('startBtn')) flap();
});

loop();
</script>
</body>
</html>
