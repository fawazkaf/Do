<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hehe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-in;
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #yesBtn {
            background: #48bb78;
            color: white;
        }

        #yesBtn:hover {
            background: #38a169;
            transform: scale(1.1);
        }

        #noBtn {
            background: #f56565;
            color: white;
            position: relative;
        }

        #noBtn:hover {
            background: #e53e3e;
        }

        .celebration {
            display: none;
        }

        .celebration.show {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        .celebration h2 {
            color: #48bb78;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .celebration img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }

        .shy-message {
            color: #e53e3e;
            font-size: 1.1em;
            margin-top: 15px;
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="question">
            <h1>You wanna do it?</h1>
            <div class="button-container">
                <button id="yesBtn">Yes! 😊</button>
                <button id="noBtn">No</button>
            </div>
            <p class="shy-message" id="shyMessage" style="display: none;">"No" seems a bit shy 😈</p>
        </div>

        <div class="celebration" id="celebration">
            <h2>YAY! 🎉</h2>
            <p style="font-size: 1.3em; color: #555;">This is gonna be awesome!</p>
            <img src="https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyejU2aXJpbDFhM2lrM3dzeGdpYjRsMTA0c3NxMHFoZm1jNTFqeXhpbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/5VhzCYV4lKVxaZbzmD/giphy.gif" alt="Celebration">
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const question = document.getElementById('question');
        const celebration = document.getElementById('celebration');
        const shyMessage = document.getElementById('shyMessage');

        let noBtnClickCount = 0;

        yesBtn.addEventListener('click', function() {
            question.style.display = 'none';
            celebration.classList.add('show');
        });

        noBtn.addEventListener('click', function() {
            noBtnClickCount++;
            shyMessage.style.display = 'block';
            
            // Make the No button move away
            const container = document.querySelector('.container');
            const containerRect = container.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            
            const maxX = containerRect.width - btnRect.width - 80;
            const maxY = 200;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';

            // Make Yes button bigger each time
            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            yesBtn.style.fontSize = (currentSize + 5) + 'px';
            yesBtn.style.animation = 'bounce 0.5s ease';
        });
    </script>
</body>
</html>
